name: Release

# Triggers automatically when main changes: reads the VERSION file and creates
# a GitHub Release if one doesn't already exist for that version.
# To ship a new release, bump VERSION, commit, and push/merge to main.
#
# Can also be triggered manually via workflow_dispatch with a version override.
#
# The workflow:
#   1. Reads the version from the VERSION file (or the manual input)
#   2. Skips if a GitHub Release for that version already exists
#   3. Builds a universal BlindSpot.app (arm64 + x86_64)
#   4. Packages it as BlindSpot-<version>.dmg with a drag-to-Applications layout
#   5. Creates a GitHub Release with the DMG attached
#   6. (If HOMEBREW_TAP_TOKEN is set) rewrites Casks/blindspot.rb in the
#      Nainounen/homebrew-blindspot tap so `brew upgrade --cask blindspot`
#      picks up the new version automatically.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.0.1) — leave blank to use VERSION file"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-26
    outputs:
      version:  ${{ steps.meta.outputs.version }}
      sha256:   ${{ steps.sha.outputs.sha256 }}
      dmg_name: ${{ steps.meta.outputs.dmg_name }}
      skipped:  ${{ steps.check.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(tr -d '[:space:]' < VERSION)
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$VERSION'. Expected MAJOR.MINOR.PATCH."
            exit 1
          fi
          echo "version=$VERSION"               >> "$GITHUB_OUTPUT"
          echo "dmg_name=BlindSpot-$VERSION.dmg" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} already exists — skipping build."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      # Pin Xcode 26 — required for swift-tools-version 6.2 and macOS 26 target.
      - name: Select Xcode
        if: steps.check.outputs.skipped == 'false'
        run: |
          if [ -d /Applications/Xcode_26.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          fi
          xcodebuild -version
          swift --version

      - name: Install create-dmg
        if: steps.check.outputs.skipped == 'false'
        run: brew install create-dmg

      # Import the Developer ID Application cert into a throwaway keychain and
      # auto-detect the signing identity. If the secret isn't configured the
      # build still proceeds (ad-hoc signed, unnotarized) so releases never
      # hard-fail on a missing cert.
      - name: Import Developer ID certificate
        id: signing
        if: steps.check.outputs.skipped == 'false'
        env:
          CERT_P12:      ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CERT_P12:-}" ]]; then
            echo "::warning::DEVELOPER_ID_CERT_P12 not set — ad-hoc signing, no notarization."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          CERT_FILE="$RUNNER_TEMP/cert.p12"
          echo -n "$CERT_P12" | base64 --decode > "$CERT_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make the temp keychain searchable alongside the existing ones.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_FILE"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*\"(.+)\"/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::No 'Developer ID Application' identity found in the imported cert."
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # Write the App Store Connect API key to disk and export the notarytool
      # env vars consumed by make-release.sh. Skipped when secrets are absent.
      - name: Prepare notarization key
        if: steps.check.outputs.skipped == 'false'
        env:
          NOTARY_KEY_P8:    ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID:    ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${NOTARY_KEY_P8:-}" ]]; then
            echo "::warning::NOTARY_KEY_P8 not set — DMG will not be notarized."
            exit 0
          fi
          KEYFILE="$RUNNER_TEMP/notary_key.p8"
          echo -n "$NOTARY_KEY_P8" | base64 --decode > "$KEYFILE"
          echo "NOTARY_KEY_FILE=$KEYFILE"       >> "$GITHUB_ENV"
          echo "NOTARY_KEY_ID=$NOTARY_KEY_ID"   >> "$GITHUB_ENV"
          echo "NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Build universal BlindSpot.app + DMG
        if: steps.check.outputs.skipped == 'false'
        run: ./scripts/make-release.sh "${{ steps.meta.outputs.version }}"

      - name: Generate appcast.xml
        if: steps.check.outputs.skipped == 'false'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set — skipping appcast generation."
            exit 0
          fi
          # Resolve Sparkle tools from the SPM artifacts cache
          swift package resolve 2>/dev/null || true
          SPARKLE_TOOLS=".build/artifacts/sparkle/Sparkle/bin"
          # Write private key to temp file, generate appcast, clean up
          KEYFILE=$(mktemp)
          echo -n "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"
          "$SPARKLE_TOOLS/generate_appcast" \
            --ed-key-file "$KEYFILE" \
            --link "https://github.com/Nainounen/blind-spot/releases" \
            --download-url-prefix "https://github.com/Nainounen/blind-spot/releases/download/v${{ steps.meta.outputs.version }}/" \
            dist/
          rm -f "$KEYFILE"
          # generate_appcast writes into the scanned directory (dist/); copy to repo root
          cp dist/appcast.xml appcast.xml
          # Commit appcast.xml back to main
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update appcast for v${{ steps.meta.outputs.version }} [skip ci]"
          git push

      - name: Capture sha256
        id: sha
        if: steps.check.outputs.skipped == 'false'
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(shasum -a 256 "dist/${{ steps.meta.outputs.dmg_name }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (debug)
        if: steps.check.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.dmg_name }}
          path: dist/${{ steps.meta.outputs.dmg_name }}

      - name: Create GitHub Release
        if: steps.check.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: BlindSpot ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            **Easy / no terminal:**
            1. Download `${{ steps.meta.outputs.dmg_name }}` below
            2. Double-click to mount it
            3. Drag **BlindSpot** onto the **Applications** folder
            4. Launch it — the app is signed with a Developer ID and notarized by Apple, so it opens normally.

            **Homebrew:**
            ```
            brew tap Nainounen/blindspot
            brew install --cask blindspot
            ```
          files: |
            dist/${{ steps.meta.outputs.dmg_name }}
            dist/${{ steps.meta.outputs.dmg_name }}.sha256
          fail_on_unmatched_files: true

  update-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    # Only run when a PAT for the tap repo has been configured and the build
    # wasn't skipped. Without the PAT the build still ships — cask update skipped.
    if: ${{ needs.build.outputs.skipped == 'false' && vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - name: Rewrite Casks/blindspot.rb in tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }} # e.g. Nainounen/homebrew-blindspot
          VERSION:  ${{ needs.build.outputs.version }}
          SHA256:   ${{ needs.build.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret is not configured; skipping tap update."
            exit 0
          fi

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Casks

          cat > tap/Casks/blindspot.rb <<RUBY
          cask "blindspot" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/Nainounen/blind-spot/releases/download/v#{version}/BlindSpot-#{version}.dmg"
            name "BlindSpot"
            desc "AI answers for selected text — invisible to screen recorders"
            homepage "https://github.com/Nainounen/blind-spot"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :tahoe"

            app "BlindSpot.app"

            uninstall quit: "com.blindspot.app"

            zap trash: [
              "~/Library/Preferences/com.blindspot.app.plist",
              "~/Library/Application Support/BlindSpot",
              "~/.config/blind-spot",
            ]

            caveats <<~EOS
              BlindSpot is a menu-bar app — there's no Dock icon by design.
              Launch it once with:
                open -a BlindSpot

              Required permission on first launch:
                System Settings → Privacy & Security → Accessibility → enable BlindSpot

              To update: brew update && brew upgrade --cask blindspot
            EOS
          end
          RUBY

          # The heredoc preserves the YAML indentation; strip the leading 10
          # spaces so the resulting cask is properly formatted.
          sed -i 's/^          //' tap/Casks/blindspot.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/blindspot.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "blindspot: bump to ${VERSION}"
          git push
